<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Chess 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Cinzel:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #113629 0%, #03140e 100%); /* Premium Dark Green */
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- SCREENS --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .active-screen { display: flex; }

        /* --- SPLASH SCREEN --- */
        #splash-screen { background: #03140e; z-index: 100; }
        .splash-logo { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 20px #ffd700); }
        .loading-bar-container { width: 200px; height: 10px; border: 2px solid #8b4513; border-radius: 10px; background: #2a1a0b; margin-top: 20px; overflow: hidden; }
        .loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 0.1s; }
        .loading-text { margin-top: 10px; font-size: 12px; color: #ffd700; letter-spacing: 2px; }

        /* --- MENU SCREEN --- */
        #menu-screen { gap: 15px; }
        .menu-title { font-family: 'Cinzel', serif; font-size: 28px; color: #ffd700; text-shadow: 0 4px 10px rgba(0,0,0,0.8); margin-bottom: 30px; }
        .menu-btn {
            width: 280px; height: 60px;
            background: linear-gradient(to bottom, #00d2ff, #007bb5);
            border: 2px solid #005f8f;
            border-radius: 10px;
            color: white; font-size: 16px; font-weight: 800; letter-spacing: 1px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.8);
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .menu-btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        .menu-btn.green { background: linear-gradient(to bottom, #39ff14, #008000); border-color: #005000; }

        /* --- GAME SCREEN --- */
        .top-bar {
            width: 100%; height: 60px; background: linear-gradient(to bottom, #8b4513, #3e1f06);
            border-bottom: 3px solid #ffd700; display: flex; justify-content: space-between; align-items: center; padding: 0 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 10;
        }
        .top-bar .profile { display: flex; align-items: center; gap: 10px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffd700; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .level-text { text-align: center; }
        .level-text h3 { color: #ffd700; font-size: 14px; margin: 0; }
        .level-text p { color: #fff; font-size: 10px; letter-spacing: 1px; margin: 0; }
        .settings-btn { width: 40px; height: 40px; background: linear-gradient(to bottom, #ff4500, #8b0000); border: 2px solid #ffd700; border-radius: 5px; color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .board-container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 10px; }
        
        #board {
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px;
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            border: 8px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #ffd700, #b8860b) 1;
            background-color: #3e1f06;
            box-shadow: 0 15px 30px rgba(0,0,0,0.9);
        }

        .sq { display: flex; justify-content: center; align-items: center; position: relative; }
        .sq.light { background-color: #f0d9b5; }
        .sq.dark { background-color: #b58863; }
        .sq.selected { background-color: rgba(255, 215, 0, 0.6) !important; }
        .sq.last-move { background-color: rgba(0, 255, 0, 0.3) !important; }
        .legal-dot { width: 25%; height: 25%; background: rgba(0,0,0,0.3); border-radius: 50%; position: absolute; z-index: 2;}

        .piece { width: 90%; height: 90%; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 5; filter: drop-shadow(2px 5px 3px rgba(0,0,0,0.6)); pointer-events: none; }

        /* --- BOTTOM CONTROLS --- */
        .bottom-bar {
            width: 100%; height: 90px; background: linear-gradient(to top, #021a12, transparent);
            display: flex; justify-content: space-evenly; align-items: center; padding-bottom: 10px;
        }
        .ctrl-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .ctrl-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(145deg, #8b4513, #3e1f06);
            border: 2px solid #b8860b;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), 0 5px 10px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; color: #ffd700; font-size: 22px;
        }
        .ctrl-item:active .ctrl-btn { transform: scale(0.90); box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        .ctrl-label { font-size: 10px; color: #fff; font-weight: 800; letter-spacing: 1px; }

        /* Game Over Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: linear-gradient(to bottom, #8b4513, #3e1f06); border: 3px solid #ffd700; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .modal-content h2 { color: #ffd700; margin-bottom: 10px; }
        .modal-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen" class="screen active-screen">
        <div class="splash-logo">♟️</div>
        <h1 style="color:#ffd700; font-family:'Cinzel', serif; letter-spacing:3px;">CHESS MASTER</h1>
        <div class="loading-bar-container"><div class="loading-bar" id="l-bar"></div></div>
        <div class="loading-text" id="l-text">LOADING...</div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="splash-logo" style="font-size: 60px;">♟️</div>
        <div class="menu-title">CHOOSE YOUR MODE</div>
        <div class="menu-btn green" onclick="startGame('ai')">🤖 PLAY VS COMPUTER</div>
        <div class="menu-btn" onclick="startGame('pvp')">👥 2 PLAYERS</div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div class="profile" onclick="backToMenu()">
                <div class="profile-img">◀</div>
            </div>
            <div class="level-text">
                <h3>LEVEL 1</h3>
                <p id="game-mode-text">BEGINNER</p>
            </div>
            <div class="settings-btn">⚙️</div>
        </div>

        <div class="board-container"><div id="board"></div></div>

        <div class="bottom-bar">
            <div class="ctrl-item" onclick="resetGame()">
                <div class="ctrl-btn">🔄</div>
                <div class="ctrl-label">RESTART</div>
            </div>
            <div class="ctrl-item">
                <div class="ctrl-btn">♖</div>
                <div class="ctrl-label">PIECES</div>
            </div>
            <div class="ctrl-item" onclick="undoMove()">
                <div class="ctrl-btn">↩</div>
                <div class="ctrl-label">UNDO</div>
            </div>
            <div class="ctrl-item" onclick="hintMove()">
                <div class="ctrl-btn" style="border-color: #ff4500; color: #ff4500;">💡</div>
                <div class="ctrl-label">HINT</div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">GAME OVER</h2>
            <p id="modal-desc" style="color:white;"></p>
            <button class="modal-btn" onclick="backToMenu()">MAIN MENU</button>
        </div>
    </div>

<script>
    // Asset URLs (High Quality Standard SVGs)
    const piecesURL = {
        'wp': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg',
        'wn': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
        'wb': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
        'wr': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
        'wq': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
        'wk': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
        'bp': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
        'bn': 'https://upload.wikimedia.org/wikipedia/commons/e/ed/Chess_ndt45.svg',
        'bb': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
        'br': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
        'bq': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
        'bk': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg'
    };

    // Splash Screen Logic
    window.onload = () => {
        let width = 0;
        const bar = document.getElementById('l-bar');
        const int = setInterval(() => {
            width += 5;
            bar.style.width = width + '%';
            if(width >= 100) {
                clearInterval(int);
                setTimeout(() => {
                    document.getElementById('splash-screen').classList.remove('active-screen');
                    document.getElementById('menu-screen').classList.add('active-screen');
                }, 300);
            }
        }, 50);
    };

    // Game Logic
    let game = new Chess();
    let boardEl = document.getElementById('board');
    let selectedSq = null;
    let mode = 'pvp';
    let lastMoveSq = null;

    function startGame(selectedMode) {
        mode = selectedMode;
        document.getElementById('game-mode-text').innerText = mode === 'ai' ? 'VS COMPUTER' : '2 PLAYERS';
        document.getElementById('menu-screen').classList.remove('active-screen');
        document.getElementById('game-screen').classList.add('active-screen');
        resetGame();
    }

    function backToMenu() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('game-screen').classList.remove('active-screen');
        document.getElementById('menu-screen').classList.add('active-screen');
    }

    function drawBoard() {
        boardEl.innerHTML = '';
        let validMoves = selectedSq ? game.moves({ square: selectedSq, verbose: true }).map(m => m.to) : [];

        for(let i=0; i<64; i++) {
            let row = Math.floor(i/8);
            let col = i%8;
            let sqName = String.fromCharCode(97+col) + (8-row);
            
            let sq = document.createElement('div');
            sq.className = `sq ${(row+col)%2 === 0 ? 'light' : 'dark'}`;
            if(sqName === selectedSq) sq.classList.add('selected');
            if(lastMoveSq && (sqName === lastMoveSq.from || sqName === lastMoveSq.to)) sq.classList.add('last-move');

            let piece = game.get(sqName);
            if(piece) {
                let pEl = document.createElement('div');
                pEl.className = 'piece';
                pEl.style.backgroundImage = `url(${piecesURL[piece.color + piece.type]})`;
                sq.appendChild(pEl);
            }

            if(validMoves.includes(sqName)) {
                let dot = document.createElement('div');
                dot.className = 'legal-dot';
                sq.appendChild(dot);
            }

            sq.onclick = () => handleSquareClick(sqName);
            boardEl.appendChild(sq);
        }
        checkGameOver();
    }

    function handleSquareClick(sq) {
        if(game.game_over()) return;
        if(mode === 'ai' && game.turn() === 'b') return;

        let piece = game.get(sq);

        if(selectedSq) {
            let move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
            if(move) {
                lastMoveSq = move;
                selectedSq = null;
                playSound('move');
                drawBoard();
                if(mode === 'ai') setTimeout(makeAIMove, 400);
            } else {
                selectedSq = (piece && piece.color === game.turn()) ? sq : null;
                drawBoard();
            }
        } else {
            if(piece && piece.color === game.turn()) {
                selectedSq = sq;
                drawBoard();
            }
        }
    }

    function makeAIMove() {
        if(game.game_over()) return;
        let moves = game.moves({ verbose: true });
        if(moves.length === 0) return;
        
        // Simple AI: Prioritize captures, else random
        let bestMove = moves.find(m => m.captured);
        if(!bestMove) bestMove = moves[Math.floor(Math.random() * moves.length)];
        
        let move = game.move(bestMove);
        lastMoveSq = move;
        playSound(move.captured ? 'capture' : 'move');
        drawBoard();
    }

    function resetGame() {
        game.reset();
        selectedSq = null;
        lastMoveSq = null;
        document.getElementById('modal').style.display = 'none';
        drawBoard();
    }

    function undoMove() {
        game.undo();
        if(mode === 'ai') game.undo();
        lastMoveSq = null;
        selectedSq = null;
        drawBoard();
    }

    function hintMove() {
        if(game.game_over() || (mode==='ai' && game.turn()==='b')) return;
        let moves = game.moves({ verbose: true });
        if(moves.length > 0) {
            let randMove = moves[Math.floor(Math.random() * moves.length)];
            selectedSq = randMove.from;
            drawBoard();
        }
    }

    function checkGameOver() {
        if(game.game_over()) {
            let desc = "Game Over";
            if(game.in_checkmate()) desc = "CHECKMATE! " + (game.turn() === 'w' ? "Black Wins" : "White Wins");
            else if(game.in_draw()) desc = "It's a DRAW!";
            else if(game.in_stalemate()) desc = "STALEMATE!";
            
            document.getElementById('modal-desc').innerText = desc;
            setTimeout(() => document.getElementById('modal').style.display = 'flex', 500);
        }
    }

    // Basic Sound Synthesis (No external files needed, works immediately)
    function playSound(type) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            if(type === 'move') {
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            } else if (type === 'capture') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.8, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            }
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}
    }
</script>
</body>
</html>
