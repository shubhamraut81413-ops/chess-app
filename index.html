<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRR Kirana Store - Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b5e20; /* Dark Green - Quality Sign */
            --accent: #ffd700;  /* Gold - Premium Sign */
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding: 20px;
        }
        .login-card {
            background: var(--white); width: 100%; max-width: 350px; padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center;
        }
        .login-card h2 { color: var(--primary); margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 12px; color: #666; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-top: 5px;
        }
        .btn-main {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }

        /* --- DASHBOARD / STORE --- */
        #store-screen { display: none; padding-bottom: 80px; }
        header {
            background: var(--primary); color: white; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent);
        }
        .category-scroll {
            display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: white; white-space: nowrap;
        }
        .cat-chip {
            padding: 8px 15px; background: #eee; border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .cat-chip.active { background: var(--primary); color: white; }

        /* --- PRODUCT CARD --- */
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card {
            background: white; border-radius: 15px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center; border: 1px solid #eee;
        }
        .p-img { width: 100%; height: 100px; background: #f9f9f9; border-radius: 10px; margin-bottom: 10px; }
        .p-name { font-weight: 600; font-size: 14px; }
        .p-price { color: var(--primary); font-weight: 700; font-size: 16px; margin: 5px 0; }
        .add-btn {
            width: 100%; padding: 8px; background: var(--accent); color: #000; border: none;
            border-radius: 8px; font-weight: 700; font-size: 12px;
        }

        /* --- ADMIN PANEL (ONLY FOR YOU) --- */
        #admin-screen { display: none; padding: 20px; background: #fff; min-height: 100vh; }
        .order-card {
            border-left: 5px solid var(--primary); background: #f9f9f9; padding: 15px;
            margin-bottom: 15px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .status-badge {
            display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 11px;
            font-weight: 700; margin-top: 10px;
        }
        .status-pending { background: #fff3e0; color: #ef6c00; }
        .status-shifted { background: #e8f5e9; color: #2e7d32; }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: white; height: 70px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #ddd; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="login-screen" class="active-screen">
        <div class="login-card">
            <h1 style="color:var(--primary); font-size:24px;">SRR STORE</h1>
            <p style="font-size:12px; color:#666; margin-bottom:20px;">Quality Grocery at your door</p>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="number" id="phone" placeholder="98765 XXXXX">
            </div>
            <button class="btn-main" onclick="handleLogin()">Login with OTP</button>
        </div>
    </div>

    <div id="store-screen">
        <header>
            <div style="font-weight: 700; font-size: 20px;">SRR STORE</div>
            <div id="admin-toggle" onclick="showAdmin()" style="cursor:pointer;">🔑</div>
        </header>

        <div class="category-scroll">
            <div class="cat-chip active">All Items</div>
            <div class="cat-chip">Oil & Masala</div>
            <div class="cat-chip">Rice & Dal</div>
            <div class="cat-chip">Biscuits</div>
        </div>

        <div class="product-list" id="p-list">
            </div>

        <div class="nav-bar">
            <div>🏠<br><span style="font-size:10px">Home</span></div>
            <div onclick="showOrders()">📦<br><span style="font-size:10px">Orders</span></div>
            <div>🛒<br><span style="font-size:10px">Cart</span></div>
        </div>
    </div>

    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>Order Dashboard</h2>
            <button onclick="backToStore()" style="padding:5px 10px;">Back</button>
        </div>
        <div id="admin-orders">
            </div>
    </div>

    <script>
        // Data Structure for Saman
        const products = [
            { id: 1, name: "Sugar (Chini)", price: 44, weight: "1 kg", img: "https://via.placeholder.com/100" },
            { id: 2, name: "Peanut Oil", price: 175, weight: "1 Liter", img: "https://via.placeholder.com/100" },
            { id: 3, name: "Toor Dal", price: 160, weight: "1 kg", img: "https://via.placeholder.com/100" }
        ];

        let orders = [
            { id: "#101", customer: "Rahul Patil", items: "Sugar 2kg, Oil 1L", total: 263, status: "Pending" }
        ];

        function handleLogin() {
            let phone = document.getElementById('phone').value;
            if(phone.length === 10) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('store-screen').style.display = 'block';
                loadProducts();
            } else {
                alert("Please enter valid 10 digit number");
            }
        }

        function loadProducts() {
            const list = document.getElementById('p-list');
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="p-img"></div>
                    <div class="p-name">${p.name}</div>
                    <div class="p-price">₹${p.price}</div>
                    <div style="font-size:10px; margin-bottom:5px;">Min: ${p.weight}</div>
                    <button class="add-btn">ADD TO CART</button>
                </div>
            `).join('');
        }

        function showAdmin() {
            document.getElementById('store-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            loadAdminOrders();
        }

        function loadAdminOrders() {
            const container = document.getElementById('admin-orders');
            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>Order ${o.id}</b>
                        <span>₹${o.total}</span>
                    </div>
                    <div style="font-size:13px; margin:5px 0;">${o.customer}</div>
                    <div style="font-size:12px; color:#555;">${o.items}</div>
                    <div class="status-badge ${o.status === 'Pending' ? 'status-pending' : 'status-shifted'}">${o.status}</div>
                    ${o.status === 'Pending' ? `<button onclick="shiftOrder('${o.id}')" style="margin-left:10px; padding:5px; font-size:10px;">Mark as Shifted</button>` : ''}
                </div>
            `).join('');
        }

        function shiftOrder(id) {
            let order = orders.find(o => o.id === id);
            order.status = "Shifted";
            loadAdminOrders();
            alert("Customer notified: Your order is Shifted!");
        }

        function backToStore() {
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('store-screen').style.display = 'block';
        }
    </script>
</body>
</html>
